name: CI/CD Multi-Arch Pipeline

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CACHE_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/cloud-tech-cache
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-secure:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Logowanie CLI
      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      # 2. Przygotowanie środowiska Multi-Arch przez CLI
      - name: Set up QEMU emulator
        run: docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

      - name: Set up Docker Buildx
        run: |
          docker buildx create --use --name politechnika_builder
          docker buildx inspect --bootstrap

      # 3. Budowanie obrazu dla Trivy (wykorzystuje i zapisuje cache)
      - name: Build and load image for analysis
        run: |
          docker buildx build \
            --context . \
            --file Dockerfile \
            --cache-from type=registry,ref=${{ env.CACHE_REPO }}:cache-main \
            --cache-to type=registry,ref=${{ env.CACHE_REPO }}:cache-main,mode=max \
            --tag local-test-image:latest \
            --load

      # 4. Skanowanie Trivy (pobierane niezależnie przez curl)
      - name: Run Trivy vulnerability scanner
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          trivy image --exit-code 1 --ignore-unfixed --vuln-type os,library --severity HIGH,CRITICAL local-test-image:latest

      # 5. Ostateczny Push do GHCR (błyskawiczny dzięki cache z kroku 3)
      - name: Push Multi-Arch production image to GHCR
        run: |
          IMAGE_LOWER=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          SHA_TAG="sha-${{ github.sha }}"
          
          docker buildx build \
            --context . \
            --file Dockerfile \
            --platform linux/amd64,linux/arm64 \
            --cache-from type=registry,ref=${{ env.CACHE_REPO }}:cache-main \
            --tag ${IMAGE_LOWER}:latest \
            --tag ${IMAGE_LOWER}:${SHA_TAG} \
            --push