name: CI/CD Multi-Arch Pipeline

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CACHE_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/cloud-tech-cache
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-secure:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Logowanie przez CLI do DockerHub
      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      # Logowanie przez CLI do GHCR
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      # KROK 1: Budowa obrazu na architekturę hosta (amd64)
      - name: Build local image for CVE scanning
        run: |
          docker build \
            --cache-from type=registry,ref=${{ env.CACHE_REPO }}:cache-main \
            -t local-test-image:latest .

      # KROK 2: Pobranie niezależnego skryptu Trivy i skanowanie (bez kontenerów i bez apt-get)
      - name: Run Trivy vulnerability scanner
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          trivy image --exit-code 1 --ignore-unfixed --vuln-type os,library --severity HIGH,CRITICAL local-test-image:latest

      # KROK 3: Budowanie wieloplatformowe (Multi-Arch) i wysyłka do GHCR oraz Cache
      - name: Build and push Multi-Arch production image
        run: |
          IMAGE_LOWER=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          SHA_TAG="sha-${{ github.sha }}"
          
          # Aktywacja wbudowanego w Docker emulatora binfmt dla wielu architektur
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
          
          # Tworzenie stabilnego buildera
          docker buildx create --use --name mybuilder
          
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --cache-from type=registry,ref=${{ env.CACHE_REPO }}:cache-main \
            --cache-to type=registry,ref=${{ env.CACHE_REPO }}:cache-main,mode=max \
            -t ${IMAGE_LOWER}:latest \
            -t ${IMAGE_LOWER}:${SHA_TAG} \
            --push .