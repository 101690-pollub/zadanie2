name: CI/CD Multi-Arch Pipeline

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CACHE_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/cloud-tech-cache

jobs:
  build-and-secure:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Logowanie ręczne przez CLI do DockerHub (na potrzeby cache)
      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      # Logowanie ręczne przez CLI do GHCR
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      # Włączenie emulacji Multi-Arch (QEMU) za pomocą oficjalnego kontenera bez wtyczek
      - name: Set up QEMU via Docker
        run: docker run --privileged --rm tonistiigi/binfmt --install all

      # Tworzenie nowego buildera Buildx ręcznie przez CLI
      - name: Set up Docker Buildx
        run: |
          docker buildx create --name mybuilder --use
          docker buildx inspect --bootstrap

      # KROK 1: Budowa lokalna na architekturę runnera (amd64) w celu wykonania testu CVE
      - name: Build local image for CVE scanning
        run: |
          docker buildx build \
            --context . \
            --file Dockerfile \
            --tag local-test-image:latest \
            --cache-from type=registry,ref=${{ env.CACHE_REPO }}:cache-main \
            --load

      # KROK 2: Skanowanie obrazu za pomocą oficjalnego kontenera Trivy (omijamy wtyczkę aquasecurity)
      - name: Run Trivy vulnerability scanner
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v $HOME/.cache:/root/.cache \
            aquasecurity/trivy:latest image \
            --exit-code 1 \
            --ignore-unfixed \
            --vuln-type os,library \
            --severity HIGH,CRITICAL \
            local-test-image:latest

      # KROK 3: Budowanie właściwe (Multi-Arch) i wypchnięcie do GHCR oraz cache do DockerHub
      - name: Build and push Multi-Arch production image
        run: |
          # Zamieniamy nazwę repozytorium na małe litery (wymóg GHCR dla nazw obrazów)
          IMAGE_LOWER=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          SHA_TAG="sha-${{ github.sha }}"
          
          docker buildx build \
            --context . \
            --file Dockerfile \
            --platform linux/amd64,linux/arm64 \
            --tag ${IMAGE_LOWER}:latest \
            --tag ${IMAGE_LOWER}:${SHA_TAG} \
            --cache-from type=registry,ref=${{ env.CACHE_REPO }}:cache-main \
            --cache-to type=registry,ref=${{ env.CACHE_REPO }}:cache-main,mode=max \
            --push